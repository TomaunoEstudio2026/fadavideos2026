function esc(s){return String(s==null?'':s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function money(n){n=Number(n||0);return '$ '+n.toLocaleString('es-AR');}
function getToken(){return localStorage.getItem(LS_TOKEN)||'';}
function apiUrl(){return 'https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+DATA_FILE;}
function headers(){let h={'Accept':'application/vnd.github+json'};let t=getToken();if(t)h.Authorization='Bearer '+t;return h;}
function setStatus(ok,txt){$('statusDot').className=ok?'dot ok':'dot';$('statusText').textContent=txt;}
function b64ToUtf8(str){try{return decodeURIComponent(Array.prototype.map.call(atob(String(str).replace(/\n/g,'')),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));}catch(e){return atob(String(str).replace(/\n/g,''));}}
function utf8ToB64(str){return btoa(unescape(encodeURIComponent(str)));}
function randCode(){return String(Math.floor(1000+Math.random()*9000));}
function slug(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'').toUpperCase();}
function normalize(d){if(!d||!Array.isArray(d.eventos))d=JSON.parse(JSON.stringify(FALLBACK));d.eventos.forEach((e,i)=>{if(!e.id)e.id='ev_'+Date.now()+'_'+i;if(!e.numero)e.numero=i+1;if(!e.visibilidad)e.visibilidad='publico';if(!Array.isArray(e.videos))e.videos=[];e.videos.forEach((v,j)=>{if(!v.id)v.id=String(j+1);if(!v.codigo)v.codigo=randCode();if(v.previewInicio==null||v.previewInicio==='')v.previewInicio=120;if(v.previewSegundos==null||v.previewSegundos==='')v.previewSegundos=20;if(v.descargas==null)v.descargas=0;if(v.plays==null)v.plays=0;if(!v.subtitulo&&v.bailarina)v.subtitulo=v.bailarina;});});return d;}
function eventVideoKey(eid,vid){return String(eid)+'_'+String(vid).replace(/[^a-zA-Z0-9_-]/g,'_');}
function todayKey(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
async function fbTrack(tipo,payload){payload=payload||{};let now=Date.now();let data=Object.assign({tipo:tipo,fecha:now,dia:todayKey(),url:location.href},payload);try{await push(ref(db,FB_BASE+'/actividad'),data);let updates={};updates[FB_BASE+'/metricas/totales/'+tipo]=increment(1);updates[FB_BASE+'/metricas/dias/'+todayKey()+'/'+tipo]=increment(1);if(payload.eventoId){updates[FB_BASE+'/metricas/eventos/'+payload.eventoId+'/'+tipo]=increment(1);}if(payload.videoId){let k=eventVideoKey(payload.eventoId||'ev',payload.videoId);updates[FB_BASE+'/metricas/videos/'+k+'/'+tipo]=increment(1);updates[FB_BASE+'/metricas/videos/'+k+'/titulo']=payload.titulo||'';updates[FB_BASE+'/metricas/videos/'+k+'/eventoTitulo']=payload.eventoTitulo||'';}await update(ref(db),updates);}catch(e){console.warn('Firebase track',e);}}
async function fbCreateOrder(nombre,items,total){let pedido={clienteNombre:nombre,clienteClaveBase:slug(nombre),estado:'pendiente',items:items,totalARS:total,creado:Date.now(),dia:todayKey(),origen:'web'};let r=await push(ref(db,FB_BASE+'/pedidos'),pedido);await fbTrack('compra_iniciada',{clienteNombre:nombre,totalARS:total,cantidad:items.length});return r.key;}
async function fbGetOrders(){try{let s=await get(ref(db,FB_BASE+'/pedidos'));let arr=[];if(s.exists()){let val=s.val();Object.keys(val).forEach(k=>arr.push(Object.assign({id:k},val[k])));}arr.sort((a,b)=>Number(b.creado||0)-Number(a.creado||0));state.orders=arr;return arr;}catch(e){console.warn(e);state.orders=[];return [];}}
async function fbGetStats(){try{let s=await get(ref(db,FB_BASE+'/metricas'));state.stats=s.exists()?s.val():{};return state.stats;}catch(e){state.stats={};return {};}}
async function ghLoad(){try{let r=await fetch(apiUrl()+'?t='+Date.now(),{headers:headers(),cache:'no-store'});if(!r.ok)throw new Error('Base '+r.status);let j=await r.json();state.sha=j.sha;state.data=normalize(JSON.parse(b64ToUtf8(j.content)));setStatus(true,getToken()?'Conectada':'Online');}catch(e){console.warn(e);state.sha=null;state.data=normalize(JSON.parse(JSON.stringify(FALLBACK)));setStatus(false,'Sin conexión');}afterLoad();}
async function ghSave(msg,silent){if(!getToken()){if(!silent)toast('Token requerido','Para modificar el catálogo necesitás guardar el token en este navegador.');return false;}try{let body={message:msg||'Actualizar Tomauno Videos',content:utf8ToB64(JSON.stringify(state.data,null,2)),branch:'main'};if(state.sha)body.sha=state.sha;let r=await fetch(apiUrl(),{method:'PUT',headers:Object.assign(headers(),{'Content-Type':'application/json'}),body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());let j=await r.json();state.sha=j.content.sha;setStatus(true,'Base conectada');if(!silent)toast('Guardado','Los cambios quedaron guardados.');return true;}catch(e){console.error(e);setStatus(false,'Error base');if(!silent)toast('No se pudo guardar','Revisá token y permisos del repositorio.');return false;}}
function afterLoad(){let hash=(location.hash||'').replace('#','');let ev=null;if(hash){let parts=hash.split(',');ev=state.data.eventos.find(x=>String(x.numero)===parts[0]||x.id===parts[0]);}if(!ev){let visibles=state.data.eventos.filter(x=>x.visibilidad!=='oculto');ev=visibles[visibles.length-1]||state.data.eventos[0]||null;}state.currentEvent=ev;updateTopStats();if(ev)renderVideos();else renderEvents();if(!sessionStorage.getItem('tv_visit')){sessionStorage.setItem('tv_visit','1');fbTrack('visita_web',{});}if(ev)fbTrack('visita_evento',{eventoId:ev.id,eventoTitulo:ev.titulo});if(hash.indexOf(',')>-1)setTimeout(()=>focusVideoByHash(hash),250);}
function updateTopStats(){let evs=state.data.eventos||[];let vids=[];evs.forEach(e=>vids=vids.concat(e.videos||[]));$('stEvents').textContent=evs.length;$('stVideos').textContent=vids.length;$('stSold').textContent=(state.orders||[]).length||0;}
function totalVideos(){let a=[];(state.data.eventos||[]).forEach(e=>(e.videos||[]).forEach(v=>a.push({evento:e,video:v})));return a;}
function renderEvents(){let q=(state.eventQuery||'').toLowerCase();let evs=state.data.eventos.filter(e=>e.visibilidad==='publico'||e.visibilidad==='privado').filter(e=>!q||[e.titulo,e.subtitulo,e.numero].join(' ').toLowerCase().indexOf(q)>-1);let h='<div class="section-head"><h2>Eventos</h2><div class="event-tools"><input class="search" id="eventSearch" placeholder="Buscar evento..." value="'+esc(state.eventQuery||'')+'"><button class="btn gray" id="backVideos">Volver a videos</button><span class="muted">'+evs.length+' eventos</span></div></div><div class="event-grid">';evs.forEach(e=>{let bg=e.imagen?' style="background-image:url('+esc(e.imagen)+')"':'';h+='<article class="card"><div class="'+(e.imagen?'event-img':'event-img noimg')+'"'+bg+'><b>'+esc(e.titulo)+'</b></div><div class="body"><h3>'+esc(e.titulo)+'</h3><p>'+esc(e.subtitulo||'Videos oficiales Tomauno')+'</p><div class="meta"><span class="chip">🎬 '+(e.videos||[]).length+' videos</span><span class="chip">'+(e.visibilidad==='privado'?'🔒 Privado':'Público')+'</span></div><button class="btn red" data-open-event="'+esc(e.id)+'">Ver evento</button></div></article>';});h+='</div>';$('app').innerHTML=h;$('backVideos').onclick=renderVideos;let es=$('eventSearch');if(es){es.oninput=function(){state.eventQuery=this.value;renderEvents();setTimeout(()=>{let n=$('eventSearch');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);}},0);};}bindEventButtons();}

async function validateCodeForVideo(code,e,v){let c=String(code||'').trim().toUpperCase();if(!c)return false;let base=String(v.codigo||'').trim().toUpperCase();if(base&&c===base)return true;let orders=state.orders.length?state.orders:await fbGetOrders();return orders.some(p=>String(p.estado||'').toLowerCase()==='desbloqueado'&&String(p.clave||'').trim().toUpperCase()===c&&(p.items||[]).some(it=>String(it.eventoId||'')===String(e.id)&&String(it.videoId||'')===String(v.id)));}
function cleanDriveId(value){
  var v=String(value||'').trim();
  if(!v)return '';
  var m=v.match(/\/d\/([^\/?#]+)/);
  if(m&&m[1])return m[1];
  m=v.match(/[?&]id=([^&]+)/);
  if(m&&m[1])return decodeURIComponent(m[1]);
  return v.replace(/^https?:\/\/drive\.google\.com\/file\/d\//,'').split('/')[0].split('?')[0].split('#')[0];
}
function driveDownloadUrl(id){var clean=cleanDriveId(id);return 'https://drive.google.com/uc?export=download&id='+encodeURIComponent(clean);}
function driveViewUrl(id){var clean=cleanDriveId(id);return 'https://drive.google.com/file/d/'+encodeURIComponent(clean)+'/view';}
function triggerDriveDownload(url){
  let frame=document.getElementById('driveDownloadFrame');
  if(!frame){
    frame=document.createElement('iframe');
    frame.id='driveDownloadFrame';
    frame.name='driveDownloadFrame';
    frame.style.cssText='position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;border:0;opacity:0;';
    document.body.appendChild(frame);
  }
  frame.src='about:blank';
  setTimeout(()=>{frame.src=url;},80);

  let a=document.createElement('a');
  a.href=url;
  a.setAttribute('download','');
  a.rel='noopener';
  a.style.display='none';
  document.body.appendChild(a);
  setTimeout(()=>{try{a.click();}catch(e){} setTimeout(()=>a.remove(),1200);},220);
}

async function receiptOrder(id){let orders=state.orders.length?state.orders:await fbGetOrders();let p=orders.find(x=>x.id===id);if(!p)return;let rows=(p.items||[]).map(it=>'<tr><td>'+esc(it.titulo||('Video '+it.videoId))+'</td><td>'+money(it.precio||0)+'</td></tr>').join('');let html='<div style="background:#f4f4f4;color:#111;border-radius:18px;overflow:hidden"><div style="background:linear-gradient(120deg,#111,#6b0000,#e00000);color:#fff;padding:28px"><h2 style="margin:0;font-size:38px">TOMA<span style="color:#ff1d1d">UNO</span></h2><b>Ticket de pago · Videos</b></div><div style="padding:24px"><h3>Cliente: '+esc(p.clienteNombre||'')+'</h3><p>Estado: '+esc(p.estado||'pendiente')+' · Clave: <b>'+esc(p.clave||'-')+'</b></p><table style="width:100%;border-collapse:collapse"><tr><th style="text-align:left">Concepto</th><th style="text-align:right">Monto</th></tr>'+rows+'</table><h2 style="text-align:right">Total '+money(p.totalARS||0)+'</h2><p>Gracias por formar parte de Tomauno.</p></div></div><div class="modal-actions" style="margin-top:14px"><button class="btn red" onclick="window.print()">Imprimir / guardar PDF</button></div>';openModal('Recibo',html);}

async function adminStats(){let stats=await fbGetStats();let orders=await fbGetOrders();let totals=(stats&&stats.totales)||{};let today=(stats&&stats.dias&&stats.dias[todayKey()])||{};let unlocked=orders.filter(p=>p.estado==='desbloqueado');let revenue=unlocked.reduce((a,p)=>a+Number(p.totalARS||0),0);let h='<h3>Estadísticas reales Firebase</h3><div class="metric-grid"><div class="metric-card"><b>'+Number(totals.visita_web||0)+'</b><span>Visitas web</span></div><div class="metric-card"><b>'+Number(totals.play_video||0)+'</b><span>Reproducciones</span></div><div class="metric-card"><b>'+Number(totals.compra_iniciada||0)+'</b><span>Compras iniciadas</span></div><div class="metric-card"><b>'+Number(totals.descarga_video||0)+'</b><span>Descargas</span></div><div class="metric-card"><b>'+Number(today.visita_web||0)+'</b><span>Visitas hoy</span></div><div class="metric-card"><b>'+Number(today.play_video||0)+'</b><span>Plays hoy</span></div><div class="metric-card"><b>'+unlocked.length+'</b><span>Pedidos desbloqueados</span></div><div class="metric-card"><b>'+money(revenue)+'</b><span>Recaudación</span></div></div><h3>Videos más vistos</h3><div class="rank-list">';let vids=(stats&&stats.videos)||{};Object.keys(vids).map(k=>Object.assign({key:k},vids[k])).sort((a,b)=>Number(b.play_video||0)-Number(a.play_video||0)).slice(0,12).forEach((v,i)=>{h+='<div class="rank-row"><b>#'+(i+1)+'</b><div>'+esc(v.titulo||v.key)+'<br><small>'+esc(v.eventoTitulo||'')+'</small></div><strong>▶ '+Number(v.play_video||0)+'</strong></div>';});h+='</div>';$('tabBody').innerHTML=h;}
function adminEvents(){let h='<h3>Eventos</h3><div class="form-grid"><div class="field"><label>Editar</label><select id="ev_id"><option value="">Nuevo</option>'+optionsEvents('')+'</select></div><div class="field"><label>Título</label><input id="ev_titulo"></div><div class="field span2"><label>Subtítulo</label><input id="ev_sub"></div><div class="field span2"><label>Imagen placa URL</label><input id="ev_img" placeholder="Opcional URL directa"></div><div class="field"><label>Visibilidad</label><select id="ev_vis"><option value="publico">Público</option><option value="privado">Privado</option><option value="oculto">Oculto</option></select></div><div class="field"><label>Password privado</label><input id="ev_pass"></div><div class="field span4"><button class="btn red" id="ev_save">Guardar evento</button></div></div><div class="table-wrap"><table class="table"><tr><th>#</th><th>Título</th><th>Estado</th><th>Videos</th><th>Acciones</th></tr>';state.data.eventos.forEach(e=>h+='<tr><td>'+esc(e.numero)+'</td><td>'+esc(e.titulo)+'</td><td>'+esc(e.visibilidad)+'</td><td>'+e.videos.length+'</td><td><button class="btn small gray" data-editev="'+esc(e.id)+'">Editar</button> <button class="btn small gray" data-delev="'+esc(e.id)+'">Eliminar</button></td></tr>');h+='</table></div>';$('tabBody').innerHTML=h;$('ev_id').onchange=loadEv;$('ev_save').onclick=saveEv;document.querySelectorAll('[data-editev]').forEach(b=>b.onclick=()=>{$('ev_id').value=b.getAttribute('data-editev');loadEv();});document.querySelectorAll('[data-delev]').forEach(b=>b.onclick=()=>delEv(b.getAttribute('data-delev')));}
function optionsEvents(sel){let h='';state.data.eventos.forEach(e=>h+='<option value="'+esc(e.id)+'" '+(e.id===sel?'selected':'')+'>#'+esc(e.numero)+' '+esc(e.titulo)+'</option>');return h;}
function nextEvNum(){return Math.max(0,...state.data.eventos.map(e=>Number(e.numero)||0))+1;}
function loadEv(){let e=state.data.eventos.find(x=>x.id===$('ev_id').value)||{};$('ev_titulo').value=e.titulo||'';$('ev_sub').value=e.subtitulo||'';$('ev_img').value=e.imagen||'';$('ev_vis').value=e.visibilidad||'publico';$('ev_pass').value=e.password||'';}
function saveEv(){let id=$('ev_id').value;let e=state.data.eventos.find(x=>x.id===id);if(!e){e={id:'ev_'+Date.now(),numero:nextEvNum(),videos:[]};state.data.eventos.push(e);}e.titulo=$('ev_titulo').value.trim();e.subtitulo=$('ev_sub').value.trim();e.imagen=$('ev_img').value.trim();e.visibilidad=$('ev_vis').value;e.password=$('ev_pass').value.trim();ghSave('Guardar evento '+e.titulo).then(ok=>{if(ok){state.currentEvent=e;renderAdmin();renderVideos();}});}
function delEv(id){openModal('Eliminar evento','<p>¿Seguro que querés eliminar este evento completo?</p><button class="btn red" id="confirmDelEv">Eliminar</button>');$('confirmDelEv').onclick=()=>{closeModal();state.data.eventos=state.data.eventos.filter(e=>e.id!==id);ghSave('Eliminar evento').then(ok=>{if(ok){afterLoad();renderAdmin();}});};}
function openAdminEditVideo(evId,vidId){sessionStorage.setItem(SS_ADMIN,'1');state.tab='videos';state.pendingEdit={eventoId:evId,videoId:String(vidId)};openAdmin();setTimeout(()=>{let box=document.querySelector('.admin-box');if(box)box.scrollTop=0;},250);}
function adminVideos(){let ev=(state.pendingEdit&&state.data.eventos.find(x=>x.id===state.pendingEdit.eventoId))||state.currentEvent||state.data.eventos[0];let h='<h3>Videos</h3><div class="admin-search-row"><input id="adminVideoSearch" placeholder="Buscar video para editar..." value="'+esc(state.adminVideoQuery||'')+'"><span class="view-count" id="adminVideoCount"></span></div><div class="form-grid"><div class="field"><label>Evento</label><select id="v_event">'+optionsEvents(ev?ev.id:'')+'</select></div><div class="field"><label>Editar</label><select id="v_id"><option value="">Nuevo</option></select></div><div class="field"><label>Título</label><input id="v_titulo"></div><div class="field"><label>Subtítulo/detalle</label><input id="v_subtitulo"></div><div class="field"><label>YouTube</label><input id="v_yt"></div><div class="field"><label>Inicio min</label><input id="v_ini_min" type="number" value="2"></div><div class="field"><label>Inicio seg</label><input id="v_ini_sec" type="number" value="0"></div><div class="field"><label>Duración preview</label><input id="v_dur" type="number" value="20"></div><div class="field"><label>Precio ARS</label><input id="v_precio" type="number" value="15000"></div><div class="field"><label>Drive ID</label><input id="v_drive"></div><div class="field"><label>Código base</label><input id="v_code"></div><div class="field"><label>&nbsp;</label><button class="btn red save-dirty" id="v_save" disabled>Guardar video</button></div><div class="field span4"><label>Carga masiva</label><textarea id="bulk_titles" placeholder="Un video por línea. Puede venir de Excel con tabs o texto con guion."></textarea></div><div class="field span4"><button class="btn gray" id="bulk_add">Crear videos desde texto</button></div></div><div id="v_table"></div>';$('tabBody').innerHTML=h;$('v_event').onchange=()=>{fillVideoSelect();renderVideoTable();markVideoClean();};$('v_id').onchange=loadVid;$('v_save').onclick=saveVid;$('v_yt').onblur=function(){this.value=cleanYouTube(this.value);};$('bulk_add').onclick=bulkAdd;fillVideoSelect();if(state.pendingEdit){$('v_id').value=state.pendingEdit.videoId;loadVid();state.pendingEdit=null;}else{markVideoClean();}['v_titulo','v_subtitulo','v_yt','v_ini_min','v_ini_sec','v_dur','v_precio','v_drive','v_code'].forEach(id=>{let el=$(id);if(el)el.addEventListener('input',markVideoDirty);});renderVideoTable();let avs=$('adminVideoSearch');if(avs){avs.oninput=function(){state.adminVideoQuery=this.value;renderVideoTable();};}}
function markVideoDirty(){let b=$('v_save');if(b){b.disabled=false;b.classList.add('enabled');}}function markVideoClean(){let b=$('v_save');if(b){b.disabled=true;b.classList.remove('enabled');}}
function adminEvent(){return state.data.eventos.find(e=>e.id===$('v_event').value);}
function fillVideoSelect(){let ev=adminEvent();let s=$('v_id');s.innerHTML='<option value="">Nuevo</option>';if(ev)ev.videos.forEach(v=>s.innerHTML+='<option value="'+esc(v.id)+'">'+esc(v.id)+' - '+esc(v.titulo)+'</option>');}
function loadVid(){let ev=adminEvent();let v=(ev&&ev.videos.find(x=>x.id===$('v_id').value))||{};let st=Number(v.previewInicio==null?120:v.previewInicio);$('v_titulo').value=v.titulo||'';$('v_subtitulo').value=v.subtitulo||v.bailarina||'';$('v_yt').value=v.youtubeId||'';$('v_ini_min').value=Math.floor(st/60);$('v_ini_sec').value=st%60;$('v_dur').value=v.previewSegundos==null?20:v.previewSegundos;$('v_precio').value=v.precio||15000;$('v_drive').value=v.driveId||'';$('v_code').value=v.codigo||randCode();markVideoClean();}
function nextVid(ev){return Math.max(0,...ev.videos.map(v=>Number(v.id)||0))+1;}
function saveVid(){let ev=adminEvent();if(!ev)return;let id=$('v_id').value;let v=ev.videos.find(x=>x.id===id);if(!v){v={id:String(nextVid(ev)),descargas:0,plays:0,codigo:randCode()};ev.videos.push(v);}v.titulo=$('v_titulo').value.trim();v.subtitulo=$('v_subtitulo').value.trim();v.bailarina=v.subtitulo;v.youtubeId=cleanYouTube($('v_yt').value.trim());v.previewInicio=Number($('v_ini_min').value||0)*60+Number($('v_ini_sec').value||0);v.previewSegundos=Number($('v_dur').value||20);v.precio=Number($('v_precio').value||0);v.driveId=$('v_drive').value.trim();v.codigo=$('v_code').value.trim()||randCode();ghSave('Guardar video '+v.titulo).then(ok=>{if(ok){markVideoClean();state.currentEvent=ev;renderVideoTable();renderVideos();}});}
function renderVideoTable(){let ev=adminEvent();let q=String(state.adminVideoQuery||'').toLowerCase();let list=ev?(ev.videos||[]).filter(v=>!q||[v.id,v.titulo,v.subtitulo,v.youtubeId].join(' ').toLowerCase().indexOf(q)>-1):[];let cnt=$('adminVideoCount');if(cnt)cnt.textContent=list.length+' videos';let h='<div class="draghint">Orden: arrastrá el renglón completo con el mouse y soltalo donde quieras. El guardado es silencioso para no interrumpir.</div><table class="table"><tr><th>ID</th><th>Título</th><th>Detalle</th><th>YT</th><th>Preview</th><th>Acciones</th></tr>';list.forEach((v,idx)=>h+='<tr draggable="true" data-rowv="'+esc(v.id)+'" class="'+(v.oculto?'hidden-video':'')+'"><td>'+esc(v.id)+'</td><td>'+esc(v.titulo)+'</td><td>'+esc(v.subtitulo||'')+'</td><td>'+esc(v.youtubeId||'')+'</td><td>'+esc(formatTime(v.previewInicio||0))+'</td><td><div class="row-actions"><button class="btn icon gray" title="Editar" data-editv="'+esc(v.id)+'">✎</button><button class="btn icon gray" title="Copiar link Drive" data-copydrive="'+esc(v.id)+'">🔗</button><button class="btn icon gray" title="Ocultar/mostrar" data-hidev="'+esc(v.id)+'">'+(v.oculto?'👁':'🙈')+'</button><button class="btn icon gray" title="Eliminar" data-delv="'+esc(v.id)+'">🗑</button></div></td></tr>');h+='</table>';$('v_table').innerHTML=h;document.querySelectorAll('[data-editv]').forEach(b=>b.onclick=()=>{$('v_id').value=b.getAttribute('data-editv');loadVid();let box=document.querySelector('.admin-box');if(box)box.scrollTop=0;});document.querySelectorAll('[data-copydrive]').forEach(b=>b.onclick=()=>copyDriveLink(b.getAttribute('data-copydrive')));document.querySelectorAll('[data-delv]').forEach(b=>b.onclick=()=>delVid(b.getAttribute('data-delv')));document.querySelectorAll('[data-hidev]').forEach(b=>b.onclick=()=>toggleHideVid(b.getAttribute('data-hidev')));let dragging=null;document.querySelectorAll('[data-rowv]').forEach(row=>{row.addEventListener('dragstart',evn=>{dragging=row.getAttribute('data-rowv');row.classList.add('dragging');evn.dataTransfer.effectAllowed='move';});row.addEventListener('dragend',()=>row.classList.remove('dragging'));row.addEventListener('dragover',evn=>{evn.preventDefault();});row.addEventListener('drop',evn=>{evn.preventDefault();let target=row.getAttribute('data-rowv');if(dragging&&target&&dragging!==target)moveVidTo(dragging,target);});});}
function copyDriveLink(id){let ev=adminEvent();let v=ev&&ev.videos.find(x=>String(x.id)===String(id));if(!v||!v.driveId){toast('Sin Drive','Este video no tiene Drive ID cargado.');return;}let url=driveViewUrl(v.driveId);if(navigator.clipboard){navigator.clipboard.writeText(url);toast('Copiado','Link de Drive copiado.');}else openModal('Link Drive','<div class="field"><input value="'+esc(url)+'" readonly></div>');}
function moveVid(id,dir){let ev=adminEvent();if(!ev)return;let i=ev.videos.findIndex(v=>String(v.id)===String(id));let j=i+dir;if(i<0||j<0||j>=ev.videos.length)return;let tmp=ev.videos[i];ev.videos[i]=ev.videos[j];ev.videos[j]=tmp;ghSave('Cambiar orden videos',true).then(ok=>{if(ok){renderVideoTable();renderVideos();}});}function moveVidTo(id,targetId){let ev=adminEvent();if(!ev)return;let from=ev.videos.findIndex(v=>String(v.id)===String(id));let to=ev.videos.findIndex(v=>String(v.id)===String(targetId));if(from<0||to<0||from===to)return;let item=ev.videos.splice(from,1)[0];ev.videos.splice(to,0,item);ghSave('Cambiar orden videos',true).then(ok=>{if(ok){renderVideoTable();renderVideos();}});}function toggleHideVid(id){let ev=adminEvent();let v=ev&&ev.videos.find(x=>String(x.id)===String(id));if(!v)return;v.oculto=!v.oculto;ghSave((v.oculto?'Ocultar ':'Mostrar ')+v.titulo).then(ok=>{if(ok){renderVideoTable();renderVideos();}});}
function delVid(id){let ev=adminEvent();openModal('Eliminar video','<p>¿Seguro que querés eliminar este video?</p><button class="btn red" id="confirmDelVid">Eliminar</button>');$('confirmDelVid').onclick=()=>{closeModal();ev.videos=ev.videos.filter(v=>v.id!==id);ghSave('Eliminar video').then(ok=>{if(ok){renderAdmin();renderVideos();}});};}
function cleanLine(s){return String(s||'').replace(/\s+/g,' ').replace(/\s*-\s*/g,' - ').trim();}
function bulkAdd(){let ev=adminEvent();let txt=($('bulk_titles').value||'').trim();if(!ev||!txt){toast('Sin texto','Pegá un título por renglón.');return;}let added=0;txt.split(/\r?\n/).forEach(line=>{line=cleanLine(line);if(!line||/^participante/i.test(line))return;let cols=line.split(/\t/).map(cleanLine);let raw=cols.length>1?(cols[0]+' - '+(cols[1]||'')):line;let parts=raw.split(' - ');let titulo=parts.shift().trim();let subtitulo=parts.join(' - ').trim();if(!subtitulo&&cols.length>2)subtitulo=[cols[2],cols[3]].filter(Boolean).join(' • ');if(!titulo)return;ev.videos.push({id:String(nextVid(ev)),titulo:titulo,subtitulo:subtitulo,bailarina:subtitulo,youtubeId:'',previewInicio:120,previewSegundos:20,precio:15000,driveId:'',codigo:randCode(),descargas:0,plays:0});added++;});$('bulk_titles').value='';ghSave('Carga masiva '+added+' videos').then(ok=>{if(ok){state.currentEvent=ev;renderAdmin();renderVideos();}});}
function adminKeys(){let h='<h3>Claves base del catálogo</h3><p class="muted">Para pedidos nuevos usá la pestaña Pedidos. Esta sección sirve para códigos cargados directo en cada video.</p><table class="table"><tr><th>Evento</th><th>Video</th><th>Código</th><th>Acción</th></tr>';totalVideos().forEach(x=>{if(x.video.driveId)h+='<tr><td>'+esc(x.evento.titulo)+'</td><td>'+esc(x.video.titulo)+'</td><td><b>'+esc(x.video.codigo)+'</b></td><td><button class="btn small gray" data-copy="'+esc(x.video.codigo)+'">Copiar</button></td></tr>';});h+='</table>';$('tabBody').innerHTML=h;document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard.writeText(b.getAttribute('data-copy'));toast('Copiado','Código copiado.');});}
function cleanYouTube(input){let s=String(input||'').trim();if(!s)return '';try{if(s.indexOf('http')===0){let u=new URL(s);if(u.hostname.indexOf('youtu.be')>-1)return (u.pathname.split('/')[1]||'').split('?')[0];if(u.searchParams.get('v'))return u.searchParams.get('v');let m=u.pathname.match(/\/(embed|shorts)\/([^/?#]+)/);if(m)return m[2];}}catch(e){}let mm=s.match(/([A-Za-z0-9_-]{11})/);return mm?mm[1]:s;}
function formatTime(sec){sec=Number(sec||0);let m=Math.floor(sec/60),s=sec%60;return m+':'+(s<10?'0':'')+s;}
$('btnEvents').onclick=renderEvents;$('btnVideos').onclick=renderVideos;$('modalClose').onclick=closeModal;$('modal').onclick=e=>{if(e.target===$('modal'))closeModal();};$('adminTrigger').ondblclick=askAdmin;$('adminClose').onclick=()=>{$('adminModal').style.display='none';};$('chatBtn').onclick=()=>{$('chatFrame').src=CHAT_URL;$('chatModal').style.display='flex';};$('chatClose').onclick=()=>{$('chatModal').style.display='none';$('chatFrame').src='about:blank';};$('chatOpen').onclick=()=>window.open(CHAT_URL,'_blank');$('cartBuy').onclick=buyCart;$('cartClear').onclick=()=>{state.cart={};renderVideos();};document.addEventListener('contextmenu',e=>{if(e.target&&e.target.closest&&e.target.closest('.admin-modal,.modal:not(.video-preview)'))return; e.preventDefault();e.stopPropagation();if(!state._lastCtx||Date.now()-state._lastCtx>1500){state._lastCtx=Date.now();toast('Contenido protegido','La vista previa no permite copiar enlaces desde la web.');}return false;},{capture:true});document.addEventListener('dragstart',e=>{if(e.target&&e.target.closest&&e.target.closest('[data-rowv]'))return;e.preventDefault();},{capture:true});window.addEventListener('hashchange',afterLoad);
(async()=>{await Promise.all([ghLoad(),fbGetOrders(),fbGetStats()]);updateTopStats();})();
</script>
