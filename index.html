<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomauno Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--panel:#191919;--panel2:#111;--red:#e00000;--red2:#ff1212;--white:#fff;--muted:#969696;--line:rgba(255,255,255,.10);--green:#00c853;--warn:#ffcc00}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:radial-gradient(circle at 50% 0,rgba(224,0,0,.22),transparent 32%),radial-gradient(circle at 90% 60%,rgba(224,0,0,.14),transparent 28%),#050505;color:var(--white);font-family:Inter,Arial,sans-serif;min-height:100vh}.grid-bg{position:fixed;inset:0;pointer-events:none;opacity:.24;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:64px 64px;mask-image:linear-gradient(to bottom,#000,transparent 92%)}
    header{position:sticky;top:0;z-index:20;height:64px;background:rgba(0,0,0,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px}.brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}.brand img{width:48px;height:48px;object-fit:contain}.wordmark{line-height:.85}.wordmark b{font-family:'Bebas Neue';font-size:34px;letter-spacing:1px}.wordmark b span{color:var(--red2)}.wordmark small{display:block;color:#777;letter-spacing:5px;font-weight:800;font-size:10px;margin-top:2px}.nav-actions{display:flex;gap:10px;align-items:center}.pill{border:1px solid var(--line);background:#151515;border-radius:999px;color:#ddd;padding:10px 16px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:1px}.status{display:flex;align-items:center;gap:7px}.dot{width:9px;height:9px;border-radius:50%;background:#c22;box-shadow:0 0 16px #c22}.dot.ok{background:var(--green);box-shadow:0 0 16px var(--green)}
    main{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:32px 18px 80px}.hero{text-align:center;padding:70px 10px 45px}.eyebrow{display:inline-flex;border:1px solid rgba(224,0,0,.45);background:rgba(224,0,0,.13);color:#ff2b2b;border-radius:999px;padding:9px 24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;font-size:12px}.hero h1{font-family:'Bebas Neue';font-size:clamp(72px,13vw,165px);line-height:.82;margin:28px 0 12px;letter-spacing:2px}.hero h1 span{color:var(--red2)}.hero p{color:#cfcfcf;font-size:18px;line-height:1.7;margin:0 auto;max-width:580px}.stats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:28px}.stat{min-width:140px;border-right:1px solid var(--line)}.stat:last-child{border-right:0}.stat strong{display:block;font-family:'Bebas Neue';font-size:54px;color:var(--red2)}.stat small{color:#777;font-weight:900;letter-spacing:2px;text-transform:uppercase}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:20px 0 22px}.section-head h2{font-family:'Bebas Neue';font-size:62px;margin:0;letter-spacing:1px}.muted{color:var(--muted)}.event-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.event-card,.video-card,.service-card{background:linear-gradient(180deg,#1a1a1a,#141414);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);transition:.2s}.event-card:hover,.video-card:hover{transform:translateY(-4px);border-color:rgba(224,0,0,.55)}.event-img{height:250px;background:#111 center/cover no-repeat;display:flex;align-items:center;justify-content:center}.event-img.noimg{background:radial-gradient(circle,rgba(224,0,0,.35),#111)}.event-img b{font-family:'Bebas Neue';font-size:58px}.card-body{padding:20px}.card-body h3{font-size:22px;margin:0 0 8px;font-weight:900}.card-body p{margin:0 0 16px;color:#aaa;line-height:1.5}.btn{border:0;border-radius:999px;background:var(--red2);color:#fff;font-weight:900;padding:13px 18px;cursor:pointer;box-shadow:0 8px 24px rgba(224,0,0,.3)}.btn.gray{background:#252525;color:#eee;border:1px solid var(--line);box-shadow:none}.btn.green{background:#02b15a}.btn.small{padding:9px 12px;font-size:12px}.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 25px}.search{flex:1;min-width:260px;border:1px solid var(--line);background:#191919;color:#fff;border-radius:999px;padding:15px 18px;font-size:15px}.event-pills{display:flex;gap:10px;overflow:auto;padding-bottom:8px}.event-pill{white-space:nowrap}.event-pill.active{background:var(--red2)}.video-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.thumb{position:relative;aspect-ratio:16/9;background:#080808 center/cover no-repeat;cursor:pointer}.thumb:after{content:'▶';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:rgba(224,0,0,.92);font-weight:900}.badge{position:absolute;top:10px;left:10px;background:var(--red2);padding:7px 11px;border-radius:999px;font-weight:900;font-size:12px}.badge.right{left:auto;right:10px;background:#222;border:1px solid var(--line)}.video-frame{width:100%;aspect-ratio:16/9;border:0;display:block}.video-card h3{font-size:18px}.price{font-family:'Bebas Neue';font-size:36px;color:var(--red2);letter-spacing:1px}.admin-modal,.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);padding:20px}.admin-box,.modal-box{width:min(1180px,100%);max-height:90vh;overflow:auto;background:#101010;border:1px solid rgba(224,0,0,.35);border-radius:22px;box-shadow:0 30px 100px #000}.modal-box{width:min(520px,100%)}.admin-head{position:sticky;top:0;background:#101010;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:18px;border-bottom:1px solid var(--line)}.admin-head h2{font-family:'Bebas Neue';font-size:42px;margin:0}.admin-content{padding:18px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.tab{background:#202020;border:1px solid var(--line);border-radius:999px;color:#fff;padding:11px 16px;font-weight:900;cursor:pointer}.tab.active{background:var(--red2)}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:11px;color:#888;font-weight:900;text-transform:uppercase;letter-spacing:1px}.field input,.field select,.field textarea{background:#181818;border:1px solid var(--line);border-radius:12px;color:#fff;padding:12px}.span2{grid-column:span 2}.span4{grid-column:span 4}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px}.table td{background:#171717;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;vertical-align:middle}.table td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}.chat{position:fixed;right:22px;bottom:22px;z-index:30;width:66px;height:66px;border-radius:50%;background:#009b4e;display:grid;place-items:center;color:#fff;text-decoration:none;font-size:28px;border:8px solid rgba(0,255,120,.18);box-shadow:0 0 40px rgba(0,200,83,.45)}footer{text-align:center;color:#888;padding:28px;border-top:1px solid var(--line)}footer a{color:#fff;text-decoration:none;font-weight:900}.hidden{display:none!important}.empty{text-align:center;padding:70px 20px;color:#aaa}.copy-note{font-size:12px;color:#00e676;margin-left:8px}
    @media(max-width:1050px){.video-grid{grid-template-columns:repeat(2,1fr)}.event-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:repeat(2,1fr)}.span4{grid-column:span 2}}@media(max-width:680px){header{height:auto;padding:10px;align-items:flex-start}.nav-actions{flex-direction:column;align-items:flex-end}.wordmark b{font-size:28px}.wordmark small{display:none}.hero{padding-top:38px}.event-grid,.video-grid{grid-template-columns:1fr}.section-head h2{font-size:48px}.form-grid{grid-template-columns:1fr}.span2,.span4{grid-column:span 1}.table{font-size:12px}.admin-box{max-height:94vh}.stat{border-right:0}}
  </style>
</head>

window.openEvent=function(id){var ev=state.data.eventos.find(function(x){return x.id===id});if(!ev)return;if(ev.visibilidad==='privado'){var p=prompt('Este evento es privado. Ingresá la contraseña:');if(p!==ev.password)return alert('Contraseña incorrecta.')}state.currentEvent=ev;location.hash=ev.numero||ev.id;renderVideos()}
function renderVideos(){state.view='videos';var ev=state.currentEvent;if(!ev){renderEvents();return}var q=(state.query||'').toLowerCase();var vids=ev.videos.filter(function(v){return !q||String(v.titulo+' '+(v.bailarina||'')).toLowerCase().indexOf(q)>-1});var html='<section class="hero"><span class="eyebrow">✦ '+esc(ev.titulo)+'</span><h1>VIDEOS <span>TOMAUNO</span></h1><p>'+esc(ev.subtitulo||'Elegí tu coreografía, mirá la vista previa y reservá por WhatsApp.')+'</p><div class="stats"><div class="stat"><strong>'+ev.videos.length+'</strong><small>Videos</small></div><div class="stat"><strong>'+ev.videos.filter(function(v){return v.vendido}).length+'</strong><small>Vendidos</small></div><div class="stat"><strong>'+ev.videos.reduce(function(a,v){return a+Number(v.plays||0)},0)+'</strong><small>Plays</small></div></div></section>';
html+='<div class="toolbar"><input class="search" id="searchBox" placeholder="Buscar por título o bailarina..." value="'+esc(state.query)+'" oninput="setSearch(this.value)"><div class="event-pills">';state.data.eventos.filter(function(e){return e.visibilidad!=='oculto'}).forEach(function(e){html+='<button class="pill event-pill '+(e.id===ev.id?'active':'')+'" onclick="openEvent(\''+esc(e.id)+'\')">#'+esc(e.numero||'')+' '+esc(e.titulo)+'</button>'});html+='</div></div><div class="video-grid">';if(!vids.length)html+='<div class="empty">No se encontraron videos.</div>';vids.forEach(function(v){var thumb='https://img.youtube.com/vi/'+encodeURIComponent(v.youtubeId||'')+'/hqdefault.jpg';var free=!(Number(v.previewInicio)>0||Number(v.previewSegundos)>0);html+='<article class="video-card" id="video_'+esc(v.id)+'"><div class="thumb" style="background-image:url('+thumb+')" onclick="playVideo(\''+esc(v.id)+'\')"><span class="badge">'+(free?'COMPLETO':'PREVIEW')+'</span><span class="badge right">▶ '+Number(v.plays||0)+'</span></div><div class="card-body"><h3>'+esc(v.titulo)+'</h3>'+(v.bailarina?'<p>💃 '+esc(v.bailarina)+'</p>':'')+'<div class="price">'+money(v.precio)+'</div>'+(v.precioUSD?'<p>USD '+esc(v.precioUSD)+'</p>':'')+'<button class="btn" onclick="wantVideo(\''+esc(v.id)+'\')">🛒 Quiero este video</button> '+(v.vendido?'<button class="btn green" onclick="downloadVideo(\''+esc(v.id)+'\')">Descargar</button>':'')+'</div></article>'});html+='</div>';$('app').innerHTML=html}
window.setSearch=function(v){state.query=v;renderVideos()}
window.playVideo=function(id){var ev=state.currentEvent;var v=ev.videos.find(function(x){return x.id===id});if(!v||!v.youtubeId)return;v.plays=Number(v.plays||0)+1;var start=Number(v.previewInicio||0);var end=(Number(v.previewSegundos||0)>0)? start+Number(v.previewSegundos||0):0;var src='https://www.youtube.com/embed/'+encodeURIComponent(v.youtubeId)+'?autoplay=1&rel=0';if(start>0)src+='&start='+start;if(end>0)src+='&end='+end;var el=$('video_'+id).querySelector('.thumb');el.outerHTML='<iframe class="video-frame" allow="autoplay; encrypted-media" allowfullscreen src="'+src+'"></iframe>';setTimeout(function(){ghSave('Actualizar play '+v.titulo)},300)}
window.wantVideo=function(id){var ev=state.currentEvent;var v=ev.videos.find(function(x){return x.id===id});var msg='Hola Tomauno! Quiero comprar este video:%0AEvento: '+encodeURIComponent(ev.titulo)+'%0AVideo: '+encodeURIComponent(v.titulo)+'%0A'+(v.bailarina?'Bailarina: '+encodeURIComponent(v.bailarina)+'%0A':'')+'Precio: '+encodeURIComponent(money(v.precio));window.open('https://wa.me/'+WA+'?text='+msg,'_blank')}
window.downloadVideo=function(id){var ev=state.currentEvent;var v=ev.videos.find(function(x){return x.id===id});var c=prompt('Ingresá el código de 4 dígitos:');if(c!==String(v.codigo))return alert('Código incorrecto.');v.descargas=Number(v.descargas||0)+1;ghSave('Registrar descarga '+v.titulo);showModal('¡Gracias!', '<p>Tu descarga se abrirá ahora. Si no inicia, revisá que tu navegador no bloquee ventanas emergentes.</p>');window.open('https://drive.google.com/uc?export=download&id='+encodeURIComponent(v.driveId),'_blank')}
function showModal(t,c){$('modalTitle').textContent=t;$('modalContent').innerHTML=c;$('genericModal').style.display='flex'} window.closeModal=function(){$('genericModal').style.display='none'}
$('logoAdmin').ondblclick=function(){var p=prompt('Contraseña admin:');if(p!==ADMIN_PASS)return;openAdmin()}
function openAdmin(){$('adminModal').style.display='flex';renderAdmin()} window.closeAdmin=function(){$('adminModal').style.display='none'}
function tokenBlock(){return '<div class="form-grid"><div class="field span2"><label>Token GitHub</label><input id="adm_token" type="password" value="'+esc(getToken())+'" placeholder="Pegá tu token con scope repo"></div><div class="field"><label>&nbsp;</label><button class="btn" onclick="saveToken()">Guardar token</button></div><div class="field"><label>&nbsp;</label><button class="btn gray" onclick="testToken()">Probar conexión</button></div></div><hr style="border-color:var(--line);margin:18px 0">'}
window.saveToken=function(){localStorage.setItem(LS_TOKEN,$('adm_token').value.trim());state.token=getToken();alert('Token guardado. Ahora probá conexión.')} window.testToken=function(){state.token=getToken();ghLoad().then(function(){renderAdmin()})}
function renderAdmin(){var html=tokenBlock()+'<div class="tabs"><button class="tab '+(state.tab==='eventos'?'active':'')+'" onclick="setTab(\'eventos\')">Eventos</button><button class="tab '+(state.tab==='videos'?'active':'')+'" onclick="setTab(\'videos\')">Videos</button><button class="tab '+(state.tab==='ventas'?'active':'')+'" onclick="setTab(\'ventas\')">Ventas</button></div><div id="tabBody"></div>';$('adminContent').innerHTML=html;renderTabBody()} window.setTab=function(t){state.tab=t;renderAdmin()}
function renderTabBody(){if(state.tab==='eventos')return renderAdminEvents();if(state.tab==='videos')return renderAdminVideos();return renderAdminSales()}
function eventOptions(sel){var h='';state.data.eventos.forEach(function(e){h+='<option value="'+esc(e.id)+'" '+(e.id===sel?'selected':'')+'>#'+esc(e.numero)+' '+esc(e.titulo)+'</option>'});return h}
function renderAdminEvents(){var h='<h3>Agregar / editar evento</h3><div class="form-grid"><div class="field"><label>ID a editar</label><select id="ev_select"><option value="">Nuevo</option>'+eventOptions('')+'</select></div><div class="field"><label>Título</label><input id="ev_titulo"></div><div class="field span2"><label>Subtítulo</label><input id="ev_subtitulo"></div><div class="field span2"><label>Imagen placa URL</label><input id="ev_imagen"></div><div class="field"><label>Visibilidad</label><select id="ev_vis"><option value="publico">Público</option><option value="privado">Privado</option><option value="oculto">Oculto</option></select></div><div class="field"><label>Password privado</label><input id="ev_pass"></div><div class="field span4"><button class="btn" onclick="saveEventForm()">Guardar evento</button></div></div>';h+=eventsTable();$('tabBody').innerHTML=h;$('ev_select').onchange=loadEventForm}
function eventsTable(){var h='<table class="table"><tr><th>#</th><th>Título</th><th>Visibilidad</th><th>Videos</th><th>Acciones</th></tr>';state.data.eventos.forEach(function(e){h+='<tr><td>'+esc(e.numero)+'</td><td>'+esc(e.titulo)+'</td><td>'+esc(e.visibilidad)+'</td><td>'+e.videos.length+'</td><td><button class="btn small gray" onclick="editEvent(\''+esc(e.id)+'\')">Editar</button> <button class="btn small gray" onclick="deleteEvent(\''+esc(e.id)+'\')">Eliminar</button></td></tr>'});return h+'</table>'}
window.editEvent=function(id){$('ev_select').value=id;loadEventForm()} function loadEventForm(){var id=$('ev_select').value;var e=state.data.eventos.find(function(x){return x.id===id})||{};$('ev_titulo').value=e.titulo||'';$('ev_subtitulo').value=e.subtitulo||'';$('ev_imagen').value=e.imagen||'';$('ev_vis').value=e.visibilidad||'publico';$('ev_pass').value=e.password||''}
window.saveEventForm=function(){var id=$('ev_select').value;var e=state.data.eventos.find(function(x){return x.id===id});if(!e){e={id:'ev_'+Date.now(),numero:nextEventNumber(),videos:[]};state.data.eventos.push(e)}e.titulo=$('ev_titulo').value.trim();e.subtitulo=$('ev_subtitulo').value.trim();e.imagen=$('ev_imagen').value.trim();e.visibilidad=$('ev_vis').value;e.password=$('ev_pass').value.trim();ghSave('Guardar evento '+e.titulo).then(renderAdmin)}
function nextEventNumber(){var m=0;state.data.eventos.forEach(function(e){m=Math.max(m,Number(e.numero||0))});return m+1}
window.deleteEvent=function(id){if(!confirm('¿Eliminar evento completo?'))return;state.data.eventos=state.data.eventos.filter(function(e){return e.id!==id});ghSave('Eliminar evento').then(renderAdmin)}
function renderAdminVideos(){var ev=state.currentEvent||state.data.eventos[0];var h='<h3>Agregar / editar video</h3><div class="form-grid"><div class="field"><label>Evento</label><select id="vid_event">'+eventOptions(ev?ev.id:'')+'</select></div><div class="field"><label>ID video editar</label><select id="vid_select"><option value="">Nuevo</option></select></div><div class="field span2"><label>Título</label><input id="vid_titulo"></div><div class="field"><label>Bailarina</label><input id="vid_bailarina"></div><div class="field"><label>YouTube ID</label><input id="vid_youtube"></div><div class="field"><label>Inicio preview seg.</label><input id="vid_inicio" type="number"></div><div class="field"><label>Duración preview seg.</label><input id="vid_duracion" type="number"></div><div class="field"><label>Precio ARS</label><input id="vid_precio" type="number"></div><div class="field"><label>Precio USD</label><input id="vid_usd" type="number"></div><div class="field"><label>Drive ID</label><input id="vid_drive"></div><div class="field"><label>Código</label><input id="vid_codigo" maxlength="4"></div><div class="field"><label>Vendido</label><select id="vid_vendido"><option value="false">No</option><option value="true">Sí</option></select></div><div class="field span4"><button class="btn" onclick="saveVideoForm()">Guardar video</button></div></div><div id="videosTable"></div>';$('tabBody').innerHTML=h;$('vid_event').onchange=function(){fillVideoSelect();renderVideosTable()};$('vid_select').onchange=loadVideoForm;fillVideoSelect();renderVideosTable()}
function currentAdminEvent(){return state.data.eventos.find(function(e){return e.id===$('vid_event').value})}
function fillVideoSelect(){var ev=currentAdminEvent();var sel=$('vid_select');sel.innerHTML='<option value="">Nuevo</option>';if(ev)ev.videos.forEach(function(v){sel.innerHTML+='<option value="'+esc(v.id)+'">'+esc(v.id)+' - '+esc(v.titulo)+'</option>'})}
function loadVideoForm(){var ev=currentAdminEvent();var v=ev.videos.find(function(x){return x.id===$('vid_select').value})||{};$('vid_titulo').value=v.titulo||'';$('vid_bailarina').value=v.bailarina||'';$('vid_youtube').value=v.youtubeId||'';$('vid_inicio').value=v.previewInicio||'';$('vid_duracion').value=v.previewSegundos||'';$('vid_precio').value=v.precio||'';$('vid_usd').value=v.precioUSD||'';$('vid_drive').value=v.driveId||'';$('vid_codigo').value=v.codigo||String(Math.floor(1000+Math.random()*9000));$('vid_vendido').value=String(!!v.vendido)}
window.saveVideoForm=function(){var ev=currentAdminEvent();if(!ev)return;var id=$('vid_select').value;var v=ev.videos.find(function(x){return x.id===id});if(!v){v={id:String(nextVideoId(ev)),descargas:0,plays:0};ev.videos.push(v)}v.titulo=$('vid_titulo').value.trim();v.bailarina=$('vid_bailarina').value.trim();v.youtubeId=$('vid_youtube').value.trim();v.previewInicio=Number($('vid_inicio').value||0);v.previewSegundos=Number($('vid_duracion').value||0);v.precio=Number($('vid_precio').value||0);v.precioUSD=$('vid_usd').value?Number($('vid_usd').value):null;v.driveId=$('vid_drive').value.trim();v.codigo=$('vid_codigo').value.trim()||String(Math.floor(1000+Math.random()*9000));v.vendido=$('vid_vendido').value==='true';state.currentEvent=ev;ghSave('Guardar video '+v.titulo).then(renderAdmin)}
function nextVideoId(ev){var m=0;ev.videos.forEach(function(v){m=Math.max(m,Number(v.id)||0)});return m+1}
function renderVideosTable(){var ev=currentAdminEvent();var h='<table class="table"><tr><th>ID</th><th>Título</th><th>Bailarina</th><th>YT</th><th>Vendido</th><th>Desc.</th><th>Acciones</th></tr>';if(ev)ev.videos.forEach(function(v){h+='<tr><td>'+esc(v.id)+'</td><td>'+esc(v.titulo)+'</td><td>'+esc(v.bailarina||'')+'</td><td>'+esc(v.youtubeId||'')+'</td><td>'+(v.vendido?'Sí':'No')+'</td><td>'+Number(v.descargas||0)+'</td><td><button class="btn small gray" onclick="editVideo(\''+esc(v.id)+'\')">Editar</button> <button class="btn small gray" onclick="deleteVideo(\''+esc(v.id)+'\')">Eliminar</button></td></tr>'});h+='</table>';$('videosTable').innerHTML=h}
window.editVideo=function(id){$('vid_select').value=id;loadVideoForm()} window.deleteVideo=function(id){var ev=currentAdminEvent();if(!confirm('¿Eliminar video?'))return;ev.videos=ev.videos.filter(function(v){return v.id!==id});ghSave('Eliminar video').then(renderAdmin)}
function renderAdminSales(){var h='<table class="table"><tr><th>Evento</th><th>Video</th><th>Código</th><th>Descargas</th><th>Acciones</th></tr>';state.data.eventos.forEach(function(e){e.videos.forEach(function(v){if(v.vendido){h+='<tr><td>'+esc(e.titulo)+'</td><td>'+esc(v.titulo)+'</td><td><b>'+esc(v.codigo)+'</b></td><td>'+Number(v.descargas||0)+'</td><td><button class="btn small" onclick="sendCode(\''+esc(e.id)+'\',\''+esc(v.id)+'\')">Enviar WA</button> <button class="btn small gray" onclick="copyText(\''+esc(v.codigo)+'\')">Copiar</button></td></tr>'}})});h+='</table>';$('tabBody').innerHTML=h}
window.sendCode=function(eid,vid){var e=state.data.eventos.find(function(x){return x.id===eid});var v=e.videos.find(function(x){return x.id===vid});var msg='Hola! Gracias por comprar tu video Tomauno.%0AEvento: '+encodeURIComponent(e.titulo)+'%0AVideo: '+encodeURIComponent(v.titulo)+'%0ACódigo de descarga: '+encodeURIComponent(v.codigo);window.open('https://wa.me/'+WA+'?text='+msg,'_blank')} window.copyText=function(t){navigator.clipboard.writeText(t);alert('Copiado: '+t)}
window.addEventListener('hashchange',afterLoad);
ghLoad();
})();
</script>
</body>
</html>
